name: Deploy API

on:
  push:
    branches: [master]
    paths:
      - 'core/apps/api/**'
      - 'packages/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/openclaw/www/shipshitdev/vincentshipsit/todo
            bash scripts/deploy-api.sh
