name: TestFlight

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Marketing version to upload (for example 0.1.0)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: testflight-${{ github.ref }}
  cancel-in-progress: false

jobs:
  upload:
    name: Archive and upload iOS
    runs-on: macos-26
    timeout-minutes: 60
    environment: release
    env:
      APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
      APPLE_API_KEY_ID: ${{ vars.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER_ID: ${{ vars.APPLE_API_ISSUER_ID }}
      REQUESTED_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

    steps:
      - name: Checkout exact release commit
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.4.1.app

      - name: Show toolchain
        run: xcodebuild -version

      - name: Require release commit on the default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin "$DEFAULT_BRANCH"
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/$DEFAULT_BRANCH"; then
            echo "::error::TestFlight uploads must come from the repository default branch."
            exit 1
          fi

      - name: Configure build paths
        run: |
          {
            echo "ARCHIVE_PATH=$RUNNER_TEMP/OpenFocus.xcarchive"
            echo "EXPORT_PATH=$RUNNER_TEMP/OpenFocusExport"
            echo "DERIVED_DATA_PATH=$RUNNER_TEMP/OpenFocusDerivedData"
          } >> "$GITHUB_ENV"

      - name: Validate release inputs
        env:
          APPLE_API_PRIVATE_KEY_P8_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail

          VERSION="${REQUESTED_VERSION#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release version must use X.Y.Z or vX.Y.Z."
            exit 1
          fi

          missing=()
          [[ -n "$APPLE_TEAM_ID" ]] || missing+=(APPLE_TEAM_ID)
          [[ -n "$APPLE_API_KEY_ID" ]] || missing+=(APPLE_API_KEY_ID)
          [[ -n "$APPLE_API_ISSUER_ID" ]] || missing+=(APPLE_API_ISSUER_ID)
          [[ -n "$APPLE_API_PRIVATE_KEY_P8_BASE64" ]] || missing+=(APPLE_API_PRIVATE_KEY_P8_BASE64)
          if (( ${#missing[@]} > 0 )); then
            printf '::error::Missing release environment secrets/variables: %s\n' "${missing[*]}"
            exit 1
          fi

          {
            echo "MARKETING_VERSION=$VERSION"
            echo "CURRENT_PROJECT_VERSION=$GITHUB_RUN_NUMBER"
          } >> "$GITHUB_ENV"

      - name: Configure App Store Connect key
        env:
          APPLE_API_PRIVATE_KEY_P8_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail

          ASC_KEY_DIR="$HOME/.appstoreconnect/private_keys"
          ASC_KEY_PATH="$ASC_KEY_DIR/AuthKey_${APPLE_API_KEY_ID}.p8"
          mkdir -p "$ASC_KEY_DIR"
          printf '%s' "$APPLE_API_PRIVATE_KEY_P8_BASE64" | base64 --decode -o "$ASC_KEY_PATH"
          chmod 600 "$ASC_KEY_PATH"
          echo "ASC_KEY_PATH=$ASC_KEY_PATH" >> "$GITHUB_ENV"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Archive signed iOS app
        run: |
          set -euo pipefail

          xcodebuild archive \
            -project OpenFocus.xcodeproj \
            -scheme OpenFocus-iOS \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE_PATH" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$APPLE_API_KEY_ID" \
            -authenticationKeyIssuerID "$APPLE_API_ISSUER_ID" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            MARKETING_VERSION="$MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="$CURRENT_PROJECT_VERSION"

      - name: Export IPA
        run: |
          set -euo pipefail

          EXPORT_OPTIONS="$RUNNER_TEMP/ExportOptions.plist"
          plutil -create xml1 "$EXPORT_OPTIONS"
          plutil -insert destination -string export "$EXPORT_OPTIONS"
          plutil -insert manageAppVersionAndBuildNumber -bool false "$EXPORT_OPTIONS"
          plutil -insert method -string app-store-connect "$EXPORT_OPTIONS"
          plutil -insert signingStyle -string automatic "$EXPORT_OPTIONS"
          plutil -insert stripSwiftSymbols -bool true "$EXPORT_OPTIONS"
          plutil -insert teamID -string "$APPLE_TEAM_ID" "$EXPORT_OPTIONS"
          plutil -insert uploadSymbols -bool true "$EXPORT_OPTIONS"

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$EXPORT_OPTIONS" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$APPLE_API_KEY_ID" \
            -authenticationKeyIssuerID "$APPLE_API_ISSUER_ID"

          IPA_PATH="$(find "$EXPORT_PATH" -maxdepth 1 -type f -name '*.ipa' -print -quit)"
          if [[ -z "$IPA_PATH" ]]; then
            echo "::error::Xcode export did not produce an IPA."
            exit 1
          fi
          echo "IPA_PATH=$IPA_PATH" >> "$GITHUB_ENV"

      - name: Validate IPA
        run: |
          set -euo pipefail
          xcrun altool --validate-app \
            --file "$IPA_PATH" \
            --type ios \
            --apiKey "$APPLE_API_KEY_ID" \
            --apiIssuer "$APPLE_API_ISSUER_ID"

      - name: Upload to TestFlight
        run: |
          set -euo pipefail
          xcrun altool --upload-app \
            --file "$IPA_PATH" \
            --type ios \
            --apiKey "$APPLE_API_KEY_ID" \
            --apiIssuer "$APPLE_API_ISSUER_ID"

      - name: Retain uploaded IPA
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: OpenFocus-${{ env.MARKETING_VERSION }}-${{ env.CURRENT_PROJECT_VERSION }}
          path: ${{ env.IPA_PATH }}
          if-no-files-found: error
          retention-days: 14

      - name: Release summary
        run: |
          {
            echo "### OpenFocus TestFlight upload"
            echo ""
            echo "- Marketing version: \`$MARKETING_VERSION\`"
            echo "- Build number: \`$CURRENT_PROJECT_VERSION\`"
            echo "- Commit: \`$GITHUB_SHA\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Delete temporary App Store Connect key
        if: always()
        run: |
          rm -f "${ASC_KEY_PATH:-}"
          rm -rf \
            "$RUNNER_TEMP/OpenFocus.xcarchive" \
            "$RUNNER_TEMP/OpenFocusExport" \
            "$RUNNER_TEMP/OpenFocusDerivedData"
