name: CI

on:
  push:
    branches: [master, native-rewrite]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  engine:
    name: Engine + CLI (swift test)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.app || true
      - name: Build & test pure engine
        run: |
          swift build
          swift test

  app:
    name: App build (macOS)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.app || true
      - name: Install tooling
        run: brew install xcodegen swiftlint
      - name: Generate project
        run: xcodegen generate
      - name: Build OpenFocus-macOS
        run: |
          xcodebuild -scheme OpenFocus-macOS \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            build
