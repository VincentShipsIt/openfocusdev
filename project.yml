name: OpenFocus
options:
  bundleIdPrefix: dev.openfocus
  deploymentTarget:
    iOS: "26.0"
    macOS: "26.0"
  xcodeVersion: "26.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess
    from: 4.2.2

# Layered targets. The Xcode project compiles the engine sources directly into
# framework targets (it does NOT consume the root Package.swift products) so the
# GUI apps and the `openfocus` tool link the same layers. SwiftData is a system
# framework, auto-linked wherever `import SwiftData` appears.
targets:

  # Pure engine — value types, AI client seam, natural-language date parsing,
  # Keychain. No SwiftData. Shared by every other target. macOS + iOS.
  OpenFocusCore:
    type: framework
    supportedDestinations: [macOS, iOS]
    sources:
      - path: Sources/Core
    dependencies:
      - package: KeychainAccess
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.openfocus.core
        GENERATE_INFOPLIST_FILE: YES

  # Persistence + stateful services — SwiftData @Model types and ModelContext-bound
  # services (Task/Project/AI) + the CloudKit-ready ModelContainer. macOS + iOS.
  OpenFocusData:
    type: framework
    supportedDestinations: [macOS, iOS]
    sources:
      - path: Sources/Data
    dependencies:
      - target: OpenFocusCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.openfocus.data
        GENERATE_INFOPLIST_FILE: YES

  # CLI command parser + help/usage. Pure, no persistence. macOS only.
  OpenFocusCLIKit:
    type: framework
    platform: macOS
    sources:
      - path: Sources/CLIKit
    dependencies:
      - target: OpenFocusCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.openfocus.clikit
        GENERATE_INFOPLIST_FILE: YES

  OpenFocus-macOS:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources/App
      - path: Sources/Features
      - path: Sources/SharedUI
      - path: Sources/Platform/macOS
      - path: Resources
    dependencies:
      - target: OpenFocusCore
      - target: OpenFocusData
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.openfocus.app.macos
        PRODUCT_NAME: OpenFocus
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 OpenFocus"
        # Hardened runtime enforces same-Team-ID library validation, which ad-hoc
        # (no-team) signing can't satisfy for the embedded frameworks. Re-enable it
        # for notarized distribution once a real DEVELOPMENT_TEAM is set.
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic
    preBuildScripts:
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        script: |
          if which swiftlint > /dev/null; then
            swiftlint
          else
            echo "warning: SwiftLint not installed"
          fi

  OpenFocus-iOS:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources/App
      - path: Sources/Features
      - path: Sources/SharedUI
      - path: Sources/Platform/iOS
      - path: Resources
    dependencies:
      - target: OpenFocusCore
      - target: OpenFocusData
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.openfocus.app.ios
        PRODUCT_NAME: OpenFocus
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES

  # `openfocus` CLI. Compiles Sources/CLI only (the @main entry + SwiftData-backed
  # executor) and links the layers it imports. macOS only.
  openfocus:
    type: tool
    platform: macOS
    sources:
      - path: Sources/CLI
    dependencies:
      - target: OpenFocusCore
      - target: OpenFocusData
      - target: OpenFocusCLIKit
    settings:
      base:
        PRODUCT_NAME: openfocus
        PRODUCT_BUNDLE_IDENTIFIER: dev.openfocus.cli

  OpenFocusCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/UnitTests
    dependencies:
      - target: OpenFocusCore
      - target: OpenFocusCLIKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.openfocus.core.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  OpenFocus-macOS:
    build:
      targets:
        OpenFocus-macOS: all
        OpenFocusCoreTests: [test]
    run:
      config: Debug
    test:
      targets:
        - OpenFocusCoreTests
  OpenFocus-iOS:
    build:
      targets:
        OpenFocus-iOS: all
    run:
      config: Debug
    archive:
      config: Release
