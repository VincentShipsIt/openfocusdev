# SwiftLint config — run as an Xcode pre-build phase (see project.yml) and in CI.
# Sources are Swift-5 mode; keep rules pragmatic for a solo-maintained repo.

included:
  - Sources
  - Tests

excluded:
  - .build
  - .swiftpm
  - DerivedData
  - Resources

disabled_rules:
  - todo
  - trailing_comma

opt_in_rules:
  - empty_count
  - explicit_init
  - first_where
  - redundant_nil_coalescing
  - toggle_bool
  - unneeded_parentheses_in_closure_argument

line_length:
  warning: 140
  error: 200
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 600
  error: 1000
  ignore_comment_only_lines: true

function_body_length:
  warning: 80
  error: 150

cyclomatic_complexity:
  warning: 15
  error: 25

identifier_name:
  min_length: 2
  excluded:
    - id
    - x
    - y

reporter: "xcode"
